<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background-color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Сайт успешно запущен!</h1>
        <p>Этот проект работает на связке GitHub + Cloudflare Pages.</p>
        <button onclick="alert('Всё работает идеально!')">Кликни меня</button>
    </div>
</body>
</html>
